<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You · Saniya Begum</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <span class="nav-logo">SB.</span>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
    </ul>
  </nav>

  <!-- Thank-you card centred on screen -->
  <section class="thankyou-screen">
    <div class="thankyou-card">
      <div class="ty-icon">✉️</div>
      <h1>Thank you, <span class="ty-name">{{ name }}</span>!</h1>
      <p>
        Your message has been received. I'll get back to you at
        <strong>{{ email }}</strong> as soon as possible.
      </p>
      <a href="/" class="btn btn-primary">← Back to Portfolio</a>
    </div>
    <div class="hero-blob" aria-hidden="true"></div>
  </section>

</body>
</html>
